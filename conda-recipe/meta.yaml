{% set name = "spatial-omics" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/spatial_omics-{{ version }}.tar.gz
  sha256: 95074f58a9bd8d4cfe71942eec9c454dc5c8e9ade683a9614e5f7eb953843e38

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling
  run:
    - python >=3.9
    - numpy >=1.21
    - pandas >=1.3
    - scipy >=1.7
    - scikit-learn >=1.0
    - anndata >=0.8
    - matplotlib-base >=3.4

test:
  imports:
    - spatial_omics

about:
  home: https://github.com/your-org/spatial-omics
  license: MIT
  license_file: LICENSE
  summary: Spatial copy-number & clone analysis for sparse spatial DNA-seq (DBiT / slide-DNA-seq).

extra:
  recipe-maintainers:
    - your-github-handle
